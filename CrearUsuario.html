<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear usuario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="welcome">
  <div class="background" aria-hidden="true"></div>
  <main class="page">
    <section class="card" aria-label="Crear usuario">
      <header class="card__header">
        <div class="brand-mark" aria-hidden="true">
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <div>
          <p class="eyebrow">Nuevo acceso</p>
          <h1>Crear usuario</h1>
          <p class="subtitle">Completa los datos y guarda.</p>
        </div>
      </header>

      <form class="form" id="create-form" novalidate>
        <div class="input-group">
          <label for="nombre">Nombre</label>
          <div class="input-wrapper">
            <input type="text" id="nombre" name="nombre" required placeholder="Nombre">
            <p class="error" id="nombre-error"></p>
          </div>
        </div>

        <div class="input-group">
          <label for="apellido">Apellido</label>
          <div class="input-wrapper">
            <input type="text" id="apellido" name="apellido" required placeholder="Apellido">
            <p class="error" id="apellido-error"></p>
          </div>
        </div>

        <div class="input-group">
          <label for="usuario">Usuario</label>
          <div class="input-wrapper">
            <input type="text" id="usuario" name="usuario" required placeholder="Usuario">
            <p class="error" id="usuario-error"></p>
          </div>
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <input type="email" id="email" name="email" required placeholder="correo@empresa.com">
            <p class="error" id="email-error"></p>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="password" name="password" required placeholder="Contraseña" minlength="6">
            <button type="button" class="toggle" id="toggle-password" aria-label="Mostrar u ocultar contraseña">
              <svg class="eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3l18 18" />
                <path d="M10.6 10.6A3 3 0 0 0 12 15c1.7 0 3-1.3 3-3 0-.4-.1-.9-.3-1.3" />
                <path d="M9.5 5.1C7.2 5.7 5.1 7.1 3 12c0 0 4 7 9 7 1.6 0 3-.4 4.2-1.2" />
                <path d="M14.1 5.3c2.7.5 4.9 2 6.9 6.7 0 0-1.1 2-3.1 3.8" />
              </svg>
            </button>
            <p class="error" id="password-error"></p>
          </div>
        </div>

        <div class="input-group">
          <label for="departamento">Departamento</label>
          <div class="input-wrapper">
            <input type="text" id="departamento" name="departamento" required placeholder="Departamento">
            <p class="error" id="departamento-error"></p>
          </div>
        </div>

        <div class="input-group">
          <label for="cargo">Cargo</label>
          <div class="input-wrapper">
            <input type="text" id="cargo" name="cargo" required placeholder="Cargo">
            <p class="error" id="cargo-error"></p>
          </div>
        </div>

        <div class="welcome__actions">
          <button type="button" class="btn ghost" id="back-login">Cancelar</button>
          <button type="submit" class="btn primary" id="submit">Guardar usuario</button>
        </div>
      </form>

      <div class="status" id="status" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script src="crear-usuario.js"></script>
</body>
</html>
