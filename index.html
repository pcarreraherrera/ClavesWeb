<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Seguro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="background" aria-hidden="true"></div>
  <main class="page">
    <section class="card" aria-label="Formulario de inicio de sesión">
      <header class="card__header">
        <div class="brand-mark" aria-hidden="true">
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <div>
          <p class="eyebrow">Panel seguro</p>
          <h1>Bienvenido de nuevo</h1>
          <p class="subtitle">Accede para continuar con tus proyectos.</p>
        </div>
      </header>

      <form class="form" id="login-form" novalidate>
        <div class="input-group">
          <label for="email">Correo electrónico</label>
          <div class="input-wrapper">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Z" />
                <path d="m4 7 8 5 8-5" />
              </svg>
            </span>
            <input type="email" id="email" name="email" autocomplete="email" placeholder="tu@correo.com" required>
            <p class="error" id="email-error" role="status" aria-live="polite"></p>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="10" width="14" height="10" rx="2" />
                <path d="M8 10V7a4 4 0 0 1 8 0v3" />
              </svg>
            </span>
            <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required minlength="6">
            <button type="button" class="toggle" id="toggle-password" aria-label="Mostrar u ocultar contraseña">
              <svg class="eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3l18 18" />
                <path d="M10.6 10.6A3 3 0 0 0 12 15c1.7 0 3-1.3 3-3 0-.4-.1-.9-.3-1.3" />
                <path d="M9.5 5.1C7.2 5.7 5.1 7.1 3 12c0 0 4 7 9 7 1.6 0 3-.4 4.2-1.2" />
                <path d="M14.1 5.3c2.7.5 4.9 2 6.9 6.7 0 0-1.1 2-3.1 3.8" />
              </svg>
            </button>
            <p class="error" id="password-error" role="status" aria-live="polite"></p>
          </div>
        </div>

        <div class="form__actions">
          <a class="link" href="#">¿Olvidaste tu contraseña?</a>
          <button type="submit" id="submit" class="btn primary" disabled>Iniciar sesión</button>
        </div>

        <button type="button" class="btn ghost" id="register">Crear cuenta</button>
      </form>

      <div class="status" id="status" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
